# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "hotfix/**" ]
  pull_request:
    branches: [ "main" ]
permissions:
  id-token: write
  contents: read
  # Required for uploading code scanning.
  security-events: write

jobs:
  build:

    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Set up JFrog CLI
      uses: jfrog/setup-jfrog-cli@v5
      env:
        JF_URL: ${{ vars.JF_URL }}
        JF_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
    - name: Build and Publish to JFrog
      run: |
        jf c add setup-jfrog-cli-server \
          --url=${{ vars.JF_URL }} \
          --access-token=${{ secrets.JF_ACCESS_TOKEN }} \
          --interactive=false --overwrite

        # 1. Configure the project to point to your specific JFrog repo
        jf mvn-config \
          --server-id-deploy setup-jfrog-cli-server \
          --server-id-resolve setup-jfrog-cli-server \
          --repo-resolve-releases github-action-artifacts \
          --repo-resolve-snapshots github-action-artifacts \
          --repo-deploy-releases github-action-artifacts \
          --repo-deploy-snapshots github-action-artifacts \
          

        # 2. Run the build through the JFrog CLI to capture metadata
        jf mvn clean install -B

        # 3. Publish the build info to Artifactory for full traceability
        jf rt build-collect-env
        jf rt build-publish

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
